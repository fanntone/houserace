<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>cat lab</title></head>
<body style="background:#11151c;margin:0">
<canvas id="c" width="920" height="445"></canvas>
<script src="../vendor/three.min.js"></script>
<script src="../vendor/GLTFLoader.js"></script>
<script src="../vendor/SkeletonUtils.js"></script>
<script src="../js/assets/cat-glb.js"></script>
<script>
// 單貓隔離實驗：?clone=1 骨架複製、?mat=1 材質改寫、?aces=1 色調映射、
// ?shadow=1 陰影、?anim=1 播放 Run——逐項開關找出比賽管線中讓貓變黑的環節
function flag(n) { return new RegExp(n + '=1').test(location.search); }
var renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setSize(920, 445, false);
renderer.outputEncoding = THREE.sRGBEncoding;
if (flag('aces')) { renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.05; }
if (flag('shadow')) { renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap; }
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x666666);
scene.add(new THREE.HemisphereLight(0xcfe5ff, 0x3a6b3f, 0.55));
var sun = new THREE.DirectionalLight(0xfff1d6, 1.3);
sun.position.set(130, 170, 80);
if (flag('shadow')) { sun.castShadow = true; sun.shadow.mapSize.set(2048, 2048); }
scene.add(sun);
var camera = new THREE.PerspectiveCamera(40, 920 / 445, 0.1, 100);
camera.position.set(2.2, 1.6, 2.6);
camera.lookAt(0, 0.7, 0);

var bin = atob(CAT_GLB_BASE64);
var buf = new ArrayBuffer(bin.length);
var u8 = new Uint8Array(buf);
for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
var mixer = null;
new THREE.GLTFLoader().parse(buf, '', function (gltf) {
  var root = flag('clone') ? THREE.SkeletonUtils.clone(gltf.scene) : gltf.scene;
  if (flag('mat')) {
    var tint = new THREE.Color('#f4f4f4');
    root.traverse(function (o) {
      if (o.isMesh || o.isSkinnedMesh) {
        o.castShadow = true;
        if (o.material) {
          o.material = o.material.clone();
          if (o.material.metalness !== undefined) o.material.metalness = 0;
          if (o.material.roughness !== undefined) o.material.roughness = 0.85;
          if (o.material.color) o.material.color.lerp(tint, 0.18);
        }
      }
    });
  }
  var box = new THREE.Box3().setFromObject(root);
  var size = box.getSize(new THREE.Vector3());
  var s = 1.45 / size.y;
  root.scale.setScalar(s);
  root.position.y = -box.min.y * s;
  root.rotation.y = 0.7;
  scene.add(root);
  if (flag('anim')) {
    mixer = new THREE.AnimationMixer(root);
    var clip = gltf.animations.filter(function (c) { return /Run$/.test(c.name); })[0];
    if (clip) mixer.clipAction(clip).play();
  }
  var d = document.createElement('div');
  d.id = 'dbg';
  d.style.color = '#fff';
  d.textContent = 'flags=' + location.search;
  document.body.appendChild(d);
});
setInterval(function () {
  if (mixer) mixer.update(0.08);
  renderer.render(scene, camera);
}, 80);
</script>
</body></html>
