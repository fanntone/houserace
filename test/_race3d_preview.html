<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>race3d preview</title></head>
<body style="background:#11151c;margin:0">
<div style="position:relative;width:920px">
  <canvas id="t" width="920" height="440" style="display:block"></canvas>
</div>
<script src="../js/rng.js"></script>
<script src="../js/model.js"></script>
<script src="../js/race.js"></script>
<script src="../vendor/three.min.js"></script>
<script src="../vendor/GLTFLoader.js"></script>
<script src="../vendor/SkeletonUtils.js"></script>
<script src="../js/assets/horse-glb.js"></script>
<script src="../js/assets/robot-glb.js"></script>
<script src="../js/race3d.js"></script>
<script>
window.onerror = function (msg, src, line) { // 錯誤顯示在頁面供 headless 讀取
  var e = document.getElementById('err') || document.body.appendChild(document.createElement('div'));
  e.id = 'err';
  e.textContent += msg + ' @' + (src || '').split('/').pop() + ':' + line + ' | ';
};
['warn', 'error'].forEach(function (m) { // console 輸出也鏡射到頁面
  var orig = console[m].bind(console);
  console[m] = function () {
    orig.apply(null, arguments);
    var e = document.getElementById('err') || document.body.appendChild(document.createElement('div'));
    e.id = 'err';
    e.textContent += '[' + m + '] ' + Array.prototype.map.call(arguments, function (a) {
      return (a && a.stack) ? a.stack.split('\n').slice(0, 2).join(' ') : String(a);
    }).join(' ') + ' | ';
  };
});
// ?state=idle|mid|turn|finish（預設 mid）；?yaw= 馬朝向；?ryaw= 機器人朝向；?racer=robot
var state = (location.search.match(/state=(\w+)/) || [])[1] || 'mid';
var yawParam = (location.search.match(/yaw=(-?\d+)/) || [])[1];
if (yawParam !== undefined) window.HORSE_YAW = parseInt(yawParam, 10) * Math.PI / 180;
var ryawParam = (location.search.match(/ryaw=(-?\d+)/) || [])[1];
if (ryawParam !== undefined) window.ROBOT_YAW = parseInt(ryawParam, 10) * Math.PI / 180;
var racer = (location.search.match(/racer=(\w+)/) || [])[1] || 'horse';
var round = Model.buildRound('a1b2c3d4e5f60718a1b2c3d4e5f60718', 8, 1.0);
var an = new RaceAnimator3D(document.getElementById('t'), round.horses, round.finishOrder,
  { duration: 38, racerType: racer, infieldText: '第 1 場', infieldSub: '派彩率 100%' });

function drive(from, to) { // 連續推進讓鏡頭/動畫收斂
  for (var t = from; t < to; t += 0.05) an.drawFrame(t);
  an.drawFrame(to);
}
var timer = setInterval(function () {
  if (!an._horses3d || an._horses3d.length === 0) return; // 等馬模型解析完
  clearInterval(timer);
  if (state === 'idle') { an.drawFrame(0); }
  else if (state === 'turn') { drive(4, 7.8); }
  else if (state === 'finish') { drive(33, 38.0); an._freeze = 0.5; an._flash = 0.25; an.drawFrame(38.02); }
  else if (state === 'end') { drive(36, an.endTime + 2.5); } // 賽後勝利者環繞鏡頭
  else { drive(15, 19); }
  var A = RaceAnimator3D._assets;
  var dbg = 'ns=' + A.normScale.toFixed(4) + ' bh=' + A.backHeight.toFixed(3) +
            ' hw=' + A.halfWidth.toFixed(3) + ' yo=' + (A.yOffset || 0).toFixed(3) +
            ' dur=' + A.clipDur.toFixed(2);
  document.title = 'ready ' + dbg;
  var d = document.createElement('div');
  d.id = 'dbg';
  d.textContent = dbg;
  document.body.appendChild(d);
}, 60);
</script>
</body></html>
